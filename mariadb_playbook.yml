---
- name: Automação Completa do MariaDB no RHEL
  hosts: dbservers
  become: yes

  vars:
    db_root_password: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          32623566383738363065316536613236333138313033336438356332323530396232363232616161
          6331623562653837623331366461643936666637333566630a373662613961373566636339623338
          34393538643135633937363831306336633264396663646631393765346437616565303130633631
          3566626162646332310a663264626464353030333831653862323539306361313837393262313939
          66393433393066376466393334383735316361643636643766386264623662663739
    app_db_name: "lab_db"
    app_db_user: "lab_user"
    app_db_password: "SenhaDificil123"

  tasks:
    - name: Instalar pacotes do MariaDB e dependência Python
      dnf:
        name:
          - mariadb-server
          - python3-PyMySQL
          - firewalld
          - python3-firewall
        state: latest
        update_cache: yes

    - name: Garantir que o MariaDB está rodando e habilitado
      service:
        name: mariadb
        state: started
        enabled: yes

    - name: Aguardar o socket do MariaDB estar pronto
      wait_for:
        path: /var/lib/mysql/mysql.sock
        state: present
        timeout: 30

    - name: Configurar a senha do root do MariaDB
      mysql_user:
        name: root
        password: "{{ db_root_password }}"
        login_user: root
        login_password: "{{ db_root_password }}"
        login_unix_socket: /var/lib/mysql/mysql.sock
        check_implicit_admin: yes
        state: present

    - name: Hardening - Remover usuários anônimos
      mysql_user:
        name: ''
        host_all: yes
        state: absent
        login_user: root
        login_password: "{{ db_root_password }}"

    - name: Hardening - Remover banco de dados de teste
      mysql_db:
        name: test
        state: absent
        login_user: root
        login_password: "{{ db_root_password }}"

    - name: Garantir que o serviço firewalld está ativo
      service:
        name: firewalld
        state: started
        enabled: yes

    - name: Configurar Firewall (Abrir porta 3306)
      firewalld:
        service: mysql
        permanent: yes
        state: enabled
        immediate: yes

    - name: Criar Banco de Dados da Aplicação
      mysql_db:
        name: "{{ app_db_name }}"
        state: present
        login_user: root
        login_password: "{{ db_root_password }}"
        login_unix_socket: /var/lib/mysql/mysql.sock

    - name: Criar Usuário da Aplicação com permissões
      mysql_user:
        name: "{{ app_db_user }}"
        password: "{{ app_db_password }}"
        priv: "{{ app_db_name }}.*:ALL"
        state: present
        login_user: root
        login_password: "{{ db_root_password }}"
        login_unix_socket: /var/lib/mysql/mysql.sock
